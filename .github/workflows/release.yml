name: Arch Linux Release Pipeline

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build & Publish Binary
    runs-on: ubuntu-latest
    container: archlinux:base-devel 

    steps:
      - name: Install Arch System Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm rust gtk4 gtk4-layer-shell github-cli tar git binutils gcc
          git config --global --add safe.directory '*'

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Compile Lucent (Release Profile)
        run: cargo build --release --locked

      - name: Strip Binary & Create Tarball
        run: |
          strip target/release/lucent
          mkdir release_payload
          cp target/release/lucent release_payload/
          cp org.freedesktop.Notifications.service release_payload/
          cd release_payload
          tar -czvf ../lucent-x86_64.tar.gz *

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Lucent ${{ github.ref_name }}" \
            --generate-notes \
            lucent-x86_64.tar.gz